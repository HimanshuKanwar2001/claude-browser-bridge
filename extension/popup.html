<!doctype html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #fafafa; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .logo { width: 32px; height: 32px; border-radius: 8px; }
  .title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .subtitle { font-size: 11px; color: #888; margin-top: 2px; }
  .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; margin-bottom: 10px; }
  .status.connected { background: #e8f5e9; }
  .status.disconnected { background: #ffeaea; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.on { background: #2e7d32; }
  .dot.off { background: #c62828; }
  .status-text { font-size: 12px; color: #333; }
  .info { font-size: 11px; color: #999; line-height: 1.4; }
  .info a { color: #D97757; text-decoration: none; }
  .footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; font-size: 10px; color: #bbb; text-align: center; }
</style>
</head>
<body>
  <div class="header">
    <img class="logo" src="icons/icon32.png" alt="">
    <div>
      <div class="title">Claude Code Browser Bridge</div>
      <div class="subtitle">AI-assisted live debugging</div>
    </div>
  </div>
  <div id="status" class="status disconnected">
    <div id="dot" class="dot off"></div>
    <span id="status-text" class="status-text">Checking connection...</span>
  </div>
  <p class="info">
    Connects your live Chrome tabs to <a href="https://claude.ai/code" target="_blank">Claude Code</a> for debugging, testing, and browser automation.
  </p>
  <div class="footer">v1.0.0 &middot; &copy; 2026 Himanshu Kanwar</div>
  <script src="popup.js"></script>
</body>
</html>
